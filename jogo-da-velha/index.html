<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Velha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Jogo da Velha</h1>

    <div class="score-board">
      <div class="score">
        <span class="player-label x">X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score">
        <span class="player-label draw">Empate</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score">
        <span class="player-label o">O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <div class="status" id="status">Vez do jogador X</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <button class="btn-restart" id="btn-restart">Nova Partida</button>
  </div>

  <script src="game.js"></script>
</body>
</html>

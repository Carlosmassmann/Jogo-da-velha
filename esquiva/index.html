<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esquiva!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="ui" id="ui-start">
    <h1>Esquiva!</h1>
    <p>Use <strong>← →</strong> ou <strong>A D</strong> para se mover</p>
    <p>Fuja dos elementos que caem do céu</p>
    <button id="btn-start">Jogar</button>
  </div>

  <div class="ui hidden" id="ui-gameover">
    <h1>Game Over</h1>
    <p>Pontuação: <span id="final-score">0</span></p>
    <p>Melhor: <span id="best-score">0</span></p>
    <button id="btn-restart">Jogar Novamente</button>
  </div>

  <div class="hud hidden" id="hud">
    <span>Pontos: <strong id="hud-score">0</strong></span>
    <span>Nível: <strong id="hud-level">1</strong></span>
  </div>

  <script src="game.js"></script>
</body>
</html>
